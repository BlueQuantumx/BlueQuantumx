    const n = 25;

    var nodes;
    var headers_Leancloud = { "content-type": "application/json", "x-lc-id": "0fXMSbCD7SIxO3z7u5j1VjkL-gzGzoHsz", "x-lc-Key": "eIi8ECHYotfQqPB4AQRI6nfi" };
    var password;
    function $(s) { return document.querySelectorAll(s); }

    async function initLeanCloud() {
      for (let i = 0; i < n; ++i) p.push(i);
      password = localStorage.getItem("rand");
      password = password || prompt("为访问私密内容，请输入访问口令。", "password");
      await (fetch("https://avoscloud.com/1.1/login", { headers: headers_Leancloud, method: "POST", body: `{"username":"B15Seats","password":"${password}"}` })
        .then(r => r.json()).then(s => { if (s.code) { alert(`登陆失败，请刷新重试。\n${JSON.stringify(s)}`); } else { headers_Leancloud["x-lc-session"] = s.sessionToken; localStorage.setItem("rand", password); } }));
      await (fetch("https://avoscloud.com/1.1/classes/Seat?order=-createdAt&limit=1&keys=-createdAt,-updatedAt,-objectId", { headers: headers_Leancloud, method: "GET" })
        .then(r => r.json()).then(s => (P = s.results[0].p)));
      P || (P = p);
      initSeats();
    }
    var addChanger = function (element) {
      this.onClick = function (event) {
        // console.log(this);
        // let node = document.getElementById(`p-${nodes[i].id}`);
        // console.log(nodes[i].id);
        if (hasHandled[this.id] === true) {
          hasHandled[this.id] = false;
          this.removeAttribute("active");
        } else {
          hasHandled[this.id] = true;
          this.setAttribute("active", "");
        }
      }
      element.addEventListener("click", this.onClick, false);
    }
    function initSeats() {
      for (let i = 0; i < 25; ++i) {
        hasHandled[i] = false;
      }
      let nodes = document.getElementsByClassName("p-node");

      for (let i = 0; i < nodes.length; ++i) {
        nodes[i].innerHTML = P[parseInt(nodes[i].id.replace("p-", ""))];
        var changer = new addChanger(nodes[i]);
        // nodes[i].addEventListener("click", )
      }
    }
    initLeanCloud();
