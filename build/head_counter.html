<script>
  AV.init({
    appId: "beY1CHJwtpOwXviCEyQJNlN1-gzGzoHsz",
    appKey: "mRklyzcF05p8jXk0cbRQAe7T",
    serverURL: "https://bey1chjw.lc-cn-n1-shared.com"
  });

  const n = 25;
  var P, p = [], hasHandled = []; // P:现有的排座位次序，号->人名; p:0-24的排列
  var nodes;

  function $(s) { return document.querySelectorAll(s); }

  function init() {
    for (let i = 0; i < n; ++i) p.push(i);
    if (!AV.User.current()) {
      let password = prompt("为访问私有内容，请输入密码。", "Password");
      AV.User.logIn("B15SeatChanger", password).then((res) => { loadSeats(); }).catch((error) => { alert(`登陆失败，请刷新重试。`) });
    } else {
      loadSeats();
    }
  }
  function loadSeats() {
    const query = new AV.Query('Seats');
    query.find().then((seatsHistories) => {
      P = seatsHistories[seatsHistories.length - 1].attributes.seatsDetail;
      html = '';
      let cnt = 0;
      for (let i = 0; i < 6; ++i) {
        html += '<div class="p-row">';
        for (let j = 0; j < 4; ++j)
          (html += `<div class="p-node" id="p-${cnt}">${P[cnt]}</div>`), ++cnt;
        html += "</div>";
      }
      html += `<div class="p-row"><div class="p-node" id="p-${cnt}">${P[cnt]}</div></div>`;
      ++cnt;
      $("#res")[0].innerHTML = html;
      nodes = $(".p-node");
      initSeats();
    });
  }
  var addChanger = function (element) {
    this.onClick = function (event) {
      if (hasHandled[this.id] === true) {
        hasHandled[this.id] = false;
        this.removeAttribute("active");
      } else {
        hasHandled[this.id] = true;
        this.setAttribute("active", "");
      }
    }
    element.addEventListener("click", this.onClick, false);
  }

  function initSeats() {
    for (let i = 0; i < 25; ++i) { hasHandled[i] = false; }
    for (let i = 0; i < nodes.length; ++i) {
      nodes[i].innerHTML = P[i];
      var changer = new addChanger(nodes[i]);
    }
  }

  init();
</script>
