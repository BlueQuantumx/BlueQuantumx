<head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/images/icon.png" />
    <link rel="stylesheet" href="/static/css/common.css" />
    <script src="/static/javaScripts/common.js"></script>
    <style>
        @keyframes myRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        main {
            text-align: center;
        }

        #avatar>img {
            height: 160px;
            width: 160px;
            -webkit-user-drag: none;
        }

        #introduction {
            color: var(--text-color);
            padding: 2.5em;
            margin-left: auto;
            margin-right: auto;
            width: 20em;
            height: 20em;
            position: relative;
            background-color: var(--background-color);
            overflow: hidden;
            border-radius: 10em;
        }

        #introduction::after {
            content: "";
            position: absolute;
            backdrop-filter: invert(1);
            top: calc(50%);
            left: 0;
            height: 50%;
            width: 100%;
            transform-origin: center top;
            animation: myRotate 3s ease 1s infinite;
        }

        #introduction>h1 {
            margin-top: 2em;
        }

        footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>
    <title>BlueQuantum</title>
</head>

    <nav id="top-panel">

    </nav>

            <div>sjzez 学生</div>
            <div>蒟蒻一枚</div>
        </div>
    </main>

    <footer>
        <p>
            由<a href="https://gitee.com/bluequantum"> BlueQuantum </a>没劲驱动 Copyright &copy; 2020 ~ 2020
        </p>
    </footer>
</body>
