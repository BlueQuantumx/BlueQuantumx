<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="author" content="BlueQuantum" />
    <meta name="description" content="BlueQuantum's Blog" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/images/icon.png" />
    <style>
        /* stylesheet specified for the about page */
        @import "/static/css/common.css";

        * {
            box-sizing: border-box;
        }

        @keyframes RotateAvt {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
        }

        a {
            transition: color 0.3s;
            color: var(--text-color);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-color);
        }

        main {
            margin-top: 3rem;
            text-align: center;
        }

        #avatar>img {
            height: 160px;
            width: 160px;
            -webkit-user-drag: none;
        }

        #introduction {
            color: var(--text-color);
            padding: 2.5em;
            margin-left: auto;
            margin-right: auto;
            width: 20em;
            height: 20em;
            position: relative;
            background-color: var(--background-color);
            overflow: hidden;
            border-radius: 10em;
        }

        #introduction::after {
            content: "";
            position: absolute;
            backdrop-filter: invert(1);
            top: calc(50%);
            left: 0;
            height: 50%;
            width: 100%;
            transform-origin: center top;
            animation: RotateAvt 3s;
            animation-delay: 1.0s;
            animation-iteration-count: infinite;
        }

        #introduction>h1 {
            margin-top: 2em;
        }

        footer {
            position: absolute;
            background-color: var(--background-color);
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
        }

        footer>p {
            margin: 0;
        }

        .color-switch {
            height: 1.25rem;
            width: 1.25rem;
            background-size: contain;
            background-image: var(--color-switch);
            transition: background-image 0.3s;
        }
    </style>
    <title>BlueQuantum</title>
</head>

<body style="opacity: 0;" onload="document.body.style.opacity='1'">
    <nav id="top-panel">
        <a id="myname" href="/">BlueQuantum's Blog</a>
        <span id="colorSwitch" class="color-switch"></span>
        <a id="about" href="/articles/exports/about.html" target="_blank">关于</a>
        <!-- <span id="scroll"></span> -->
        <!-- <span id="posX"></span><span id="posY"></span> -->
    </nav>

    <main>
        <h2>关于我</h2>

        <hr />

        <div id="avatar">
            <img src="/static/images/icon.png" alt="icon.png" />
        </div>

        <div id="introduction">
            <h1>BlueQuantum</h1>
            <div>sjzez 学生</div>
            <div>蒟蒻一枚</div>
        </div>
    </main>

    <footer>
        <p>
            由<a href="https://gitee.com/bluequantum"> BlueQuantum </a>没劲驱动 Copyright &copy; 2020 ~ 2020
        </p>
    </footer>
</body>

<script>
    //切换深色模式
    document.getElementById("colorSwitch").addEventListener("click", () => {
        if (document.documentElement.style.getPropertyValue("--text-color") == "black") {
            document.documentElement.style.setProperty("--text-color", "#DDDDDD");
            document.documentElement.style.setProperty("--background-color", "#121212");
            document.documentElement.style.setProperty("--color-switch", 'url("/static/images/dark/colorSwitch.png")');
            document.documentElement.style.setProperty("--background-image", 'url("/static/images/dark/background.jpg")');
            // document.documentElement.style.setProperty("--accent-color", "#5e72e4");
            // document.documentElement.style.setProperty("--auxiliary-color", "gray");
        } else {
            document.documentElement.style.setProperty("--text-color", "black");
            document.documentElement.style.setProperty("--background-color", "white");
            document.documentElement.style.setProperty("--color-switch", 'url("/static/images/light/colorSwitch.png")');
            document.documentElement.style.setProperty("--background-image", 'url("/static/images/light/background.png")');
            // document.documentElement.style.setProperty("--accent-color", "#5e72e4");
            // document.documentElement.style.setProperty("--auxiliary-color", "gray");
        }
    });
</script>

</html>
