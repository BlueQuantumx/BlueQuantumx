<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="author" content="BlueQuantum" />
    <meta name="description" content="BlueQuantum's Blog" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/images/icon.png" />
    <link rel="stylesheet" href="/static/css/colorScheme.css" />
    <style>
        /* stylesheet specified for the about page */
        @keyframes topUp {
            from {
                margin-top: unset;
            }

            to {
                margin-top: -65px;
            }
        }

        @keyframes nameDown {
            from {
                transform: unset;
            }

            to {
                transform: translateY(330px);
            }
        }

        @keyframes showUp {
            from {
                color: var(--bg);
            }

            to {
                color: var(--text);
            }
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
        }

        a {
            transition: color 0.4s;
            color: inherit;
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-color);
        }

        nav {
            animation: topUp 2s;
            animation-delay: 1s;
            animation-fill-mode: forwards;
        }

        header>h1 {
            animation: nameDown 2s;
            animation-delay: 1s;
            animation-fill-mode: forwards;
        }

        main {
            text-align: center;
        }

        main>h2 {
            margin-bottom: 0;
        }

        #avatar>img {
            height: 160px;
            width: 160px;
            -webkit-user-drag: none;
        }

        #introduction {
            color: var(--bg);
            margin-top: 2.5em;
            animation: showUp 1s;
            animation-delay: 3.0s;
            animation-fill-mode: forwards;
        }

        footer {
            position: absolute;
            background-color: var(--background-color);
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
        }
    </style>
    <title>BlueQuantum</title>
</head>

<body style="opacity: 0;" onload="document.body.style.opacity='1'">
    <nav id="top-panel">
        <a id="myname" href="/">BlueQuantum's Blog</a>
        <span id="colorScheme" class="icon"></span>
        <a id="about" href="/articles/exports/about.html" target="_blank">关于</a>
    </nav>

    <main>
        <h2>关于我</h2>

        <hr />

        <div id="avatar">
            <img src="/static/images/icon.png" alt="icon.png" />
        </div>

        <div id="introduction">
            <div>来自 HE 的退役菜鸡</div>
            <div>坐标石家庄</div>
        </div>
    </main>

    <footer>
        <p><a href="mailto:blue_quantum@outlook.com">BlueQuantum</a> Copyright &copy; 2020 ~
            2020</p>
        <p>由 BlueQuantum 没劲驱动</p>
    </footer>
</body>

</html>
